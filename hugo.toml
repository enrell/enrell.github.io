baseURL = "/myblog/"

languageCode = "en-us"
title = "Enrell's Blog"
theme = "LoveIt"

enableEmoji = true
enableRobotsTXT = true
enableGitInfo = true

[author]
  name = "enrell"
  email = "enrellsa10@proton.me"
  link = "https://github.com/enrell"

[params]
  title = "Enrell's Blog"
  description = "Developer, Creator, Open Source Enthusiast - Building cool things with code"
  
  defaultTheme = "auto"
  gitRepo = "https://github.com/enrell/myblog"
  
  [params.app]
    title = "Enrell's Blog"
    noFavicon = false
    themeColor = "#ffffff"
    iconColor = "#1e1e2e"
    tileColor = "#1e1e2e"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      name = "enrell"
      pre = "<i class='fas fa-code fa-fw' aria-hidden='true'></i>"
      typeit = true

  [params.footer]
    enable = true
    hugo = true
    copyright = true
    author = true
    since = 2025
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      avatarURL = "https://avatars.githubusercontent.com/u/60587839?v=4"
      title = "enrell"
      subtitle = "Developer, Creator, Open Source Enthusiast"
      typeit = true
      social = true
    [params.home.posts]
      enable = true
      paginate = 6

  [params.social]
    GitHub = "enrell"
    Twitter = "enrellsan"
    Discord = "enrell"
    DiscordInvite = "https://discord.com/users/enrell"

  [params.search]
    enable = true
    type = "lunr"

  [params.page]
    enable = true
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50

  [params.seo]
    image = "/images/og-image.svg"
    thumbnailUrl = "/images/og-image.svg"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]
