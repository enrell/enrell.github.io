baseURL: "https://enrell.github.io/"
title: "Enrell's Blog"
theme: "PaperMod"
pagination:
  pagerSize: 5

defaultContentLanguage: en
defaultContentLanguageInSubdir: true
locale: "en-us"
enableEmoji: true
enableRobotsTXT: true
enableGitInfo: true

languages:
  en:
    label: "English"
    locale: "en-us"
    weight: 1
    title: "Enrell's Blog"
    params:
      description: "Developer, Creator, Open Source Enthusiast - Building cool things with code"
      profileMode:
        enabled: true
        title: "enrell"
        subtitle: "Developer, Creator, Open Source Enthusiast"
        imageUrl: "https://avatars.githubusercontent.com/u/60587839?v=4"
        imageTitle: "enrell"
    menu:
      main:
        - identifier: home
          name: Home
          url: .
          weight: 1
        - identifier: posts
          name: Posts
          url: posts
          weight: 2
        - identifier: categories
          name: Categories
          url: categories
          weight: 3
        - identifier: tags
          name: Tags
          url: tags
          weight: 4
        - identifier: search
          name: Search
          url: search
          weight: 5
  pt:
    label: "Português"
    locale: "pt-br"
    weight: 2
    title: "Blog do Enrell"
    params:
      description: "Desenvolvedor, Criador, Entusiasta Open Source"
      profileMode:
        enabled: true
        title: "enrell"
        subtitle: "Desenvolvedor, Criador, Entusiasta Open Source"
        imageUrl: "https://avatars.githubusercontent.com/u/60587839?v=4"
        imageTitle: "enrell"
    menu:
      main:
        - identifier: home
          name: Início
          url: .
          weight: 1
        - identifier: posts
          name: Posts
          url: posts
          weight: 2
        - identifier: categories
          name: Categorias
          url: categories
          weight: 3
        - identifier: tags
          name: Tags
          url: tags
          weight: 4
        - identifier: search
          name: Buscar
          url: search
          weight: 5

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  mainSections:
    - posts
  env: production
  title: "Enrell's Blog"
  description: "Developer, Creator, Open Source Enthusiast - Building cool things with code"
  keywords: [Blog, Portfolio, PaperMod]
  author: enrell
  images: ["/images/og-image.svg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  displayFullLangName: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  commentsjs: true
  giscus:
    repo: "enrell/enrell.github.io"
    repoID: "R_kgDORVPJmw"
    category: "Comments"
    categoryID: "DIC_kwDO48007649"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    loading: "lazy"
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  editPost:
    URL: "https://github.com/enrell/enrell.github.io/edit/main/content"
    appendFilePath: true

  label:
    text: enrell
    iconSVG: |
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"

  app:
    title: "Enrell's Blog"
    noFavicon: false
    themeColor: "#ffffff"
    iconColor: "#1e1e2e"
    tileColor: "#1e1e2e"

  footer:
    enable: true
    hugo: true
    copyright: true
    author: true
    since: 2025
    license: '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  social:
    GitHub: enrell
    Twitter: enrellsan
    Discord: enrell

  search:
    enable: true
    type: lunr
    resultsPerPage: 10
    showSummary: true
    showDates: true
    fuseOpts:
      ignoreLocation: true
      threshold: 0.4
      keys:
        - title
        - permalink
        - summary
        - content

  page:
    enable: true
    toc:
      enable: true
      keepStatic: false
      auto: true
    code:
      copy: true
      maxShownLines: 50

  seo:
    image: "/images/og-image.svg"
    thumbnailUrl: "/images/og-image.svg"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    lineNos: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

outputs:
  home:
    - HTML
    - RSS
    - JSON