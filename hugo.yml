baseURL: "https://enrell.github.io/myblog"
title: "Enrell's Blog"
theme: "PaperMod"
paginate: 5

languageCode: "en-us"
enableEmoji: true
enableRobotsTXT: true
enableGitInfo: true

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Enrell's Blog"
  description: "Developer, Creator, Open Source Enthusiast - Building cool things with code"
  keywords: [Blog, Portfolio, PaperMod]
  author: enrell
  images: ["/images/og-image.svg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  gitRepo: "https://github.com/enrell/myblog"

  assets:
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"

  app:
    title: "Enrell's Blog"
    noFavicon: false
    themeColor: "#ffffff"
    iconColor: "#1e1e2e"
    tileColor: "#1e1e2e"

  header:
    desktopMode: fixed
    mobileMode: auto
    title:
      name: enrell
      pre: '<i class="fas fa-code fa-fw" aria-hidden="true"></i>'
      typeit: true

  footer:
    enable: true
    hugo: true
    copyright: true
    author: true
    since: 2025
    license: '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  home:
    rss: 10
    profile:
      enable: true
      avatarURL: "https://avatars.githubusercontent.com/u/60587839?v=4"
      title: enrell
      subtitle: "Developer, Creator, Open Source Enthusiast"
      typeit: true
      social: true
    posts:
      enable: true
      paginate: 6

  social:
    GitHub: enrell
    Twitter: enrellsan
    Discord: enrell

  search:
    enable: true
    type: lunr

  page:
    enable: true
    toc:
      enable: true
      keepStatic: false
      auto: true
    code:
      copy: true
      maxShownLines: 50

  seo:
    image: "/images/og-image.svg"
    thumbnailUrl: "/images/og-image.svg"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 2
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 3
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 4

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    lineNos: true
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

outputs:
  home:
    - HTML
    - RSS
    - JSON
