baseURL: "https://enrell.github.io/"
title: "Enrell's Blog"
theme: "PaperMod"
paginate: 5

languageCode: "en-us"
defaultContentLanguage: en
defaultContentLanguageInSubdir: true
enableEmoji: true
enableRobotsTXT: true
enableGitInfo: true

languages:
  en:
    languageName: "English"
    languageCode: "en-us"
    weight: 1
    title: "Enrell's Blog"
    params:
      description: "Developer, Creator, Open Source Enthusiast - Building cool things with code"
    menu:
      main:
        - identifier: home
          name: Home
          url: .
          weight: 1
        - identifier: search
          name: Search
          url: search
          weight: 3
        - identifier: posts
          name: Posts
          url: posts
          weight: 2
        - identifier: categories
          name: Categories
          url: categories
          weight: 4
        - identifier: tags
          name: Tags
          url: tags
          weight: 5
  pt:
    languageName: "Português"
    languageCode: "pt-br"
    weight: 2
    title: "Enrell's Blog"
    params:
      description: "Desenvolvedor, Criador, Entusiasta Open Source"
    menu:
      main:
        - identifier: home
          name: Início
          url: .
          weight: 1
        - identifier: search
          name: Buscar
          url: search
          weight: 3
        - identifier: posts
          name: Posts
          url: posts
          weight: 2
        - identifier: categories
          name: Categorias
          url: categories
          weight: 4
        - identifier: tags
          name: Tags
          url: tags
          weight: 5

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  mainSections:
    - posts
  env: production
  title: "Enrell's Blog"
  description: "Developer, Creator, Open Source Enthusiast - Building cool things with code"
  keywords: [Blog, Portfolio, PaperMod]
  author: enrell
  images: ["/images/og-image.svg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  displayFullLangName: true
  languageDropdown: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  commentsjs: true
  giscus:
    repo: "enrell/enrell.github.io"
    repoID: "R_kgDORVPJmw"
    category: "Comments"
    categoryID: "DIC_kwDO48007649"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"
    loading: "lazy"
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  gitRepo: "https://github.com/enrell/myblog"

  assets:
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"

  app:
    title: "Enrell's Blog"
    noFavicon: false
    themeColor: "#ffffff"
    iconColor: "#1e1e2e"
    tileColor: "#1e1e2e"

  header:
    desktopMode: fixed
    mobileMode: auto
    title:
      name: enrell
      pre: '<i class="fas fa-code fa-fw" aria-hidden="true"></i>'
      typeit: true

  footer:
    enable: true
    hugo: true
    copyright: true
    author: true
    since: 2025
    license: '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  home:
    rss: 10
    profile:
      enable: true
      avatarURL: "https://avatars.githubusercontent.com/u/60587839?v=4"
      title: enrell
      subtitle: "Developer, Creator, Open Source Enthusiast"
      typeit: true
      social: true
    posts:
      enable: true
      paginate: 6

  social:
    GitHub: enrell
    Twitter: enrellsan
    Discord: enrell

  search:
    enable: true
    type: lunr
    resultsPerPage: 10
    showSummary: true
    showDates: true
    fuseOpts:
      ignoreLocation: true
      threshold: 0.4
      keys:
        - title
        - permalink
        - summary
        - content

  page:
    enable: true
    toc:
      enable: true
      keepStatic: false
      auto: true
    code:
      copy: true
      maxShownLines: 50

  seo:
    image: "/images/og-image.svg"
    thumbnailUrl: "/images/og-image.svg"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    lineNos: true
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

outputs:
  home:
    - HTML
    - RSS
    - JSON
