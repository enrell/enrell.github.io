{{- with .TableOfContents }}
<nav class="post-toc">
  <details class="post-toc-disclosure">
    <summary class="post-toc-summary">
      <span class="post-toc-title">{{ i18n "toc" | default "Table of Contents" }}</span>
      <span class="post-toc-chevron" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </span>
    </summary>
    <div class="post-toc-inner">
      {{ . }}
    </div>
  </details>
</nav>
{{- end }}
